<!DOCTYPE html>
<html>
<head>
    <title>PakkOrder Dashboard</title>
    <style>
        body { background: #0b0e11; color: #e9edef; font-family: 'Segoe UI', sans-serif; padding: 40px; }
        h1 { color: #00a884; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: #202c33; border-radius: 8px; padding: 20px; border-left: 5px solid #00a884; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .card h3 { margin: 0 0 10px 0; color: #fff; }
        .price { color: #00a884; font-weight: bold; font-size: 1.2em; }
    </style>
</head>
<body>
    <h1>PakkOrder | Pending COD Confirmations</h1>
    <div id="display" class="grid">Loading orders...</div>

    <script>
        fetch('/api/orders')
            .then(res => {
                const source = res.headers.get('X-Data-Source');

                return res.json().then(data => ({ data, source }));
            })
            .then(({ data, source }) => {
                const div = document.getElementById('display');
                if (source === 'fallback') {
                    div.insertAdjacentHTML('beforebegin', '<p id="status">Showing sample data because the live database is unavailable.</p>');
                }

                if (!data.length) {
                    div.textContent = 'No pending confirmations found.';
                    return;
                }

                div.innerHTML = data.map(order => `
                    <div class="card">
                        <h3>Order #${order.OrderID}</h3>
                        <p><strong>Customer:</strong> ${order.BuyerName}</p>
                        <p><strong>Phone:</strong> ${order.Phone}</p>
                        <p><strong>Store:</strong> ${order.BusinessName}</p>
                        <div class="price">Rs. ${order.TotalAmount}</div>
                    </div>
                `).join('');
            })
            .catch(err => {
                const div = document.getElementById('display');
                div.innerHTML = `<div class="card"><h3>Unable to load orders</h3><p>${err.message}</p></div>`;
            });
    </script>
</body>
</html>
